<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard - Student To-Do System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    padding: 20px;
}

/* CONTAINER */
.container {
    max-width: 750px;
    margin: auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

h2 {
    color: #2c3e50;
}

.user-info {
    font-size: 14px;
    color: #777;
}

/* LOGOUT */
.logout {
    background: #ff000d;
    color: #fff;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.logout:hover {
    background: #740A03;
}

/* INPUT */
.input-group {
    display: flex;
    gap: 10px;
    margin: 20px 0;
}

.input-group input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
    outline: none;
}

.input-group input:focus {
    border-color: #007bff;
}

.input-group button {
    padding: 10px 18px;
    background: #007bff;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.input-group button:hover {
    background: #0056b3;
}

/* TABS */
.tabs {
    display: flex;
    gap: 10px;
    margin: 20px 0;
    border-bottom: 2px solid #eee;
}

.tab {
    padding: 10px 18px;
    cursor: pointer;
    border: none;
    background: none;
    font-size: 15px;
    color: #666;
    transition: 0.2s;
}

.tab.active {
    color: #007bff;
    border-bottom: 3px solid #007bff;
}

/* CONTENT */
.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

/* TASK LIST */
ul {
    list-style: none;
}

li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    border: 1px solid #eee;
    border-radius: 6px;
    margin-bottom: 10px;
    background: #fafafa;
    transition: 0.2s;
}

li:hover {
    background: #eef4ff;
}

li.completed {
    background: #e8f5e9;
    text-decoration: line-through;
    color: #888;
}

/* TASK INFO */
.task-info {
    flex: 1;
}

.task-title {
    font-weight: bold;
    margin-bottom: 5px;
}

.task-time {
    font-size: 12px;
    color: #999;
}

/* ACTIONS */
.actions {
    display: flex;
    gap: 8px;
}

.actions button {
    border: none;
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
}

/* BUTTONS */
.btn-complete {
    background: #28a745;
    color: #fff;
}

.btn-complete:hover {
    background: #218838;
}

.btn-delete {
    background: #dc3545;
    color: #fff;
}

.btn-delete:hover {
    background: #c82333;
}

/* EMPTY */
.empty-message {
    text-align: center;
    color: #999;
    padding: 25px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div>
            <h2>Student Dashboard</h2>
            <div class="user-info" id="user-info"></div>
        </div>
        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="input-group">
        <input type="text" id="task-title" placeholder="Enter new task title...">
        <button onclick="addTask()">Add Task</button>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('all', this)">All Tasks</button>
        <button class="tab" onclick="switchTab('pending', this)">Pending</button>
        <button class="tab" onclick="switchTab('completed', this)">Completed</button>
    </div>

    <div id="all" class="tab-content active">
        <ul id="all-tasks"></ul>
    </div>

    <div id="pending" class="tab-content">
        <ul id="pending-tasks"></ul>
    </div>

    <div id="completed" class="tab-content">
        <ul id="completed-tasks"></ul>
    </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));

if (!user || user.role !== 'Student') {
    window.location.href = 'login.html';
} else {
    document.getElementById('user-info').innerText =
        `Welcome, ${user.name} (${user.section})`;
    loadTasks();
}

function switchTab(tabName, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    document.getElementById(tabName).classList.add('active');
    el.classList.add('active');
}

async function loadTasks() {
    const response = await fetch('/api/tasks?userId=' + user.id);
    const tasks = await response.json();

    tasks.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

    const all = document.getElementById('all-tasks');
    const pending = document.getElementById('pending-tasks');
    const completed = document.getElementById('completed-tasks');

    all.innerHTML = '';
    pending.innerHTML = '';
    completed.innerHTML = '';

    if (tasks.length === 0) {
        all.innerHTML = '<div class="empty-message">No tasks yet.</div>';
        pending.innerHTML = '<div class="empty-message">No pending tasks.</div>';
        completed.innerHTML = '<div class="empty-message">No completed tasks.</div>';
        return;
    }

    tasks.forEach(task => {
        const li = createTaskElement(task);

        all.appendChild(li.cloneNode(true));

        if (task.isCompleted) {
            completed.appendChild(li);
        } else {
            pending.appendChild(li.cloneNode(true));
        }
    });
}

function createTaskElement(task) {
    const li = document.createElement('li');
    if (task.isCompleted) li.classList.add('completed');

    const date = new Date(task.timestamp);

    li.innerHTML = `
        <div class="task-info">
            <div class="task-title">${task.title}</div>
            <div class="task-time">
                Added: ${date.toLocaleDateString()} at ${date.toLocaleTimeString()}
            </div>
        </div>
        <div class="actions">
            ${!task.isCompleted ? `<button class="btn-complete" onclick="completeTask(${task.id})">✓ Done</button>` : ''}
            <button class="btn-delete" onclick="deleteTask(${task.id})">✕</button>
        </div>
    `;

    return li;
}

async function addTask() {
    const title = document.getElementById('task-title').value;

    if (!title) {
        alert('Enter a task');
        return;
    }

    const res = await fetch('/api/tasks/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, userId: user.id })
    });

    if (res.ok) {
        document.getElementById('task-title').value = '';
        loadTasks();
    }
}

async function completeTask(id) {
    await fetch('/api/tasks/review/' + id, { method: 'PUT' });
    loadTasks();
}

async function deleteTask(id) {
    if (confirm('Delete this task?')) {
        await fetch('/api/tasks/delete/' + id, { method: 'DELETE' });
        loadTasks();
    }
}

function logout() {
    localStorage.removeItem('user');
    window.location.href = 'login.html';
}
</script>

</body>
</html>
